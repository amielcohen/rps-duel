name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --include=dev

      - name: Run tests
        working-directory: ./frontend
        run: npm run test:run

      - name: Build
        working-directory: ./frontend
        run: npm run build